name: Hourly corrections pipeline

on:
  schedule:
    # Every hour at :00 UTC. GitHub Actions cron uses UTC.
    - cron: "0 * * * *"
  workflow_dispatch: {}  # allow manual triggering from Actions tab

permissions:
  contents: read
  issues: write    # for smart-notify step (open/close/comment on tracking issue)
  actions: read    # for smart-notify step (count consecutive failures)

concurrency:
  group: weekly-corrections-pipeline
  cancel-in-progress: false  # let a running pipeline finish; queue the next

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write service account key from secret
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          mkdir -p keys
          printf '%s' "$GCP_SA_KEY" > keys/sa-main.json
          # Sanity check that it's valid JSON
          python -c "import json; json.load(open('keys/sa-main.json'))"

      # v2.7.0: Timeback OneRoster credentials for Vita + ScienceSIS SIS bridge.
      # Fail-soft when the secret is missing — pipeline continues with Dash
      # data only and Vita/ScienceSIS students surface as Roster Additions.
      - name: Write Timeback creds from secret (fail-soft)
        env:
          TIMEBACK_CREDS_JSON: ${{ secrets.TIMEBACK_CREDS_JSON }}
        run: |
          if [ -n "$TIMEBACK_CREDS_JSON" ]; then
            mkdir -p keys
            printf '%s' "$TIMEBACK_CREDS_JSON" > keys/timeback-creds.json
            python -c "import json; json.load(open('keys/timeback-creds.json'))"
            echo "Timeback creds written."
          else
            echo "::warning::TIMEBACK_CREDS_JSON secret not set. Vita + ScienceSIS will surface as Roster Additions until secret is configured."
          fi

      - name: Run generate_corrections.py (with retry on failure)
        uses: nick-fields/retry@v3
        with:
          max_attempts: 2
          timeout_minutes: 8
          retry_wait_seconds: 60
          command: python generate_corrections.py

      - name: Clean up credentials
        if: always()
        run: rm -f keys/sa-main.json keys/timeback-creds.json

      # v2.5.3: smart-notify — only escalate on persistent failures.
      # Counts consecutive failures of THIS workflow; opens (or comments on)
      # a tracking Issue once threshold is hit. Auto-closes on next success.
      # Mute the default "Actions failure" email and subscribe to issues
      # with label `pipeline-failure` instead.
      - name: Smart-notify on persistent failure
        if: always()
        uses: actions/github-script@v7
        env:
          THRESHOLD: '3'   # consecutive failures before opening tracking issue
        with:
          script: |
            const jobFailed = '${{ job.status }}' !== 'success';
            const workflowName = context.workflow;
            const issueTitle = `🚨 ${workflowName} persistently failing`;
            const label = 'pipeline-failure';

            // Find existing open tracking issue for this workflow
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
              per_page: 100,
            });
            const existing = issues.data.find(i => i.title === issueTitle);
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            if (jobFailed) {
              // Get this run's workflow_id, then count consecutive failures
              const currentRun = await github.rest.actions.getWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId,
              });
              const runs = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: currentRun.data.workflow_id,
                per_page: 10,
              });
              let consecutive = 0;
              for (const r of runs.data.workflow_runs) {
                if (r.conclusion === 'failure') consecutive++;
                else if (r.conclusion === 'success') break;
                // ignore cancelled/skipped/null
              }
              const threshold = parseInt(process.env.THRESHOLD, 10);
              console.log(`Failure detected. Consecutive failures: ${consecutive}. Threshold: ${threshold}.`);

              if (consecutive >= threshold) {
                if (existing) {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: existing.number,
                    body: `Still failing. Consecutive failures: **${consecutive}**.\nLatest run: ${runUrl}`,
                  });
                  console.log(`Commented on issue #${existing.number}`);
                } else {
                  const created = await github.rest.issues.create({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    title: issueTitle,
                    body: `**${workflowName}** has failed ${consecutive} times consecutively.\n\nLatest run: ${runUrl}\n\nThis issue auto-closes when the next run succeeds. If it persists, investigate the run log.`,
                    labels: [label],
                  });
                  console.log(`Opened issue #${created.data.number}: ${created.data.html_url}`);
                }
              } else {
                console.log(`Below threshold; no notification.`);
              }
            } else if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `✅ Pipeline recovered. Auto-closing this tracking issue.\nRun: ${runUrl}`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                state: 'closed',
              });
              console.log(`Closed recovered issue #${existing.number}`);
            }
