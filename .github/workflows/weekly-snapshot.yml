name: Weekly snapshot (Monday)

on:
  schedule:
    # Monday 11:00 UTC = 07:00 ET (EST, standard time) / 06:00 ET (EDT, daylight saving).
    # The weekly snapshot file for the current Monday appears in the
    # "Weekly Corrections Archive" Drive folder before start of business.
    - cron: "0 11 * * 1"
  workflow_dispatch: {}  # manual re-run from Actions tab any day

concurrency:
  # Share the pipeline concurrency group with the hourly workflow so the two
  # can't both write the same cumulative tabs at the same time. Queue, don't cancel.
  group: weekly-corrections-pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write service account key from secret
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          mkdir -p keys
          printf '%s' "$GCP_SA_KEY" > keys/sa-main.json
          python -c "import json; json.load(open('keys/sa-main.json'))"

      - name: Run generate_weekly_snapshot.py (with retry on failure)
        uses: nick-fields/retry@v3
        with:
          max_attempts: 2
          timeout_minutes: 8
          retry_wait_seconds: 60
          command: python generate_weekly_snapshot.py

      - name: Clean up credentials
        if: always()
        run: rm -f keys/sa-main.json
