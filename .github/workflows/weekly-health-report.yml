name: Weekly health report

on:
  schedule:
    # Monday 12:00 UTC = 08:00 ET. Runs after weekly-snapshot (Mon 11:00 UTC),
    # so the report includes that morning's snapshot run if it succeeded.
    - cron: "0 12 * * 1"
  workflow_dispatch: {}  # manual trigger from Actions tab

permissions:
  issues: write   # to open the weekly summary issue
  actions: read   # health_report.py reads run history

# Audit-fix 2026-04-30: Mon 12:00 UTC overlaps with the hourly-pipeline run
# at 12:00 UTC. Both share write access to GitHub Issues (smart-notify on
# hourly + the health-report opener here). Different labels, but cleaner to
# serialize. cancel-in-progress=false: queue, don't drop the report.
concurrency:
  group: weekly-corrections-pipeline
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate health report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python health_report.py --days 30 --output /tmp/health.md
          echo "----- report preview -----"
          cat /tmp/health.md

      - name: Open weekly health issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/health.md', 'utf8');
            const today = new Date().toISOString().slice(0, 10);
            const title = `📊 Weekly health report — ${today}`;
            const result = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['health-report'],
            });
            console.log(`Opened issue #${result.data.number}: ${result.data.html_url}`);
